<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- 🔥 ESSENZIALE PER MOBILE -->
  <title>Lista Completa</title>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    // 🔧 INSERISCI QUI I TUOI DATI SUPABASE
    const supabaseUrl = "https://wuaptfrhsbeezdmwlmyh.supabase.co";
    const supabaseKey = "sb_publishable_jccRCJKOQzMlGTBj1dRbXQ_JayL41tV";

    window.supabase = createClient(supabaseUrl, supabaseKey);
  </script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f7fb;
      padding: 2rem;
      color: #222;
      font-size: 0.9rem;
    }


.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  padding: 1.5rem;
  border-radius: 10px;
  border: 1px solid #e1e5f0;
  box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05);
  overflow-x: auto;          /* ✅ se la tabella è troppo larga, scroll orizzontale */
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 1rem;
  table-layout: fixed;       /* ✅ colonne a larghezza fissa */
}

th, td {
  padding: 0.7rem;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
  vertical-align: top;
  word-wrap: break-word;     /* ✅ manda a capo le parole lunghe */
  overflow-wrap: break-word; /* ✅ supporto extra */
}


    h1 {
      margin-top: 0;
      font-size: 1.3rem;
    }

    th {
      background: #f3f4f6;
      font-weight: 600;
    }

    button {
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      border: 1px solid #cbd5f5;
      background: #e5edff;
      color: #1d3bb8;
      cursor: pointer;
      font-size: 0.8rem;
    }

    button.secondary {
      background: #fff;
      color: #374151;
      margin-right: 0.5rem;
    }

    .top-buttons {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    /* 📱 MOBILE FIXES — senza cambiare dimensioni */
    @media (max-width: 480px) {

      header {
        padding: 1rem;
      }

      main {
        padding: 1rem;
      }

      .grid {
        grid-template-columns: 1fr; /* una card per riga */
      }

      .card {
        padding: 1.2rem; /* leggermente più compatto */
      }
    }

.copy-btn {
  cursor: pointer;
  margin-left: 6px;
  font-size: 0.9rem;
  color: #1d3bb8;
}

.copy-btn:hover {
  color: #0a2a8a;
}

.copy-icon {
  width: 18px;
  height: 18px;
  cursor: pointer;
  margin-left: 6px;
  vertical-align: middle;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.copy-icon:hover {
  opacity: 1;
}



  </style>
</head>

<body>

  <div class="container">
    <h1 id="titolo"></h1>

    <div class="top-buttons">
      <button class="secondary" onclick="tornaHome()">Torna alla Home</button>
      <button onclick="scaricaCSV()">Scarica in CSV</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Testo</th>
          <th>Note</th>
          <th>Link</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody id="tabella"></tbody>
    </table>
  </div>

  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const lista = params.get("lista");

    if (!lista) {
      alert("Errore: nessuna lista specificata.");
    }

    document.getElementById("titolo").textContent =
      "Lista completa: " + lista.charAt(0).toUpperCase() + lista.slice(1);

    // 📌 Carica tutti gli elementi
    async function caricaLista() {
      const { data, error } = await supabase
        .from(lista)
        .select("*")
        .order("id", { ascending: true });

      if (error) {
        console.error(error);
        alert("Errore nel caricamento della lista.");
        return;
      }

      const tbody = document.getElementById("tabella");
      tbody.innerHTML = "";

      data.forEach(riga => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${riga.testo || ""}</td>
          <td>${riga.note || ""}</td>
	  <td>
  		<span class="link-text">${riga.link || ""}</span>
  		${riga.link ? `<span class="copy-btn" onclick="copiaLink('${riga.link.replace(/'/g, "\\'")}')"><svg class="copy-icon" viewBox="0 0 24 24">
  <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 
           0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 
           2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"
        fill="#7a7a7a"/>
</svg>
</span>` : ""}
	  </td>

          <td>
            <button onclick="apriElemento(${riga.id})">Apri Elemento</button>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    caricaLista();

    // 🔗 Apri elemento
    window.apriElemento = function (id) {
      window.location.href = "02.PaginaVediElemento_V01_ok.html?lista=" + lista + "&id=" + id;
    };

    // 🏠 Torna alla Home
    window.tornaHome = function () {
      window.location.href = "00.PaginaHome_Liste V08_aggiungi2.html";
    };

    // 📥 Scarica CSV
    window.scaricaCSV = function () {
      const righe = [...document.querySelectorAll("#tabella tr")].map(tr =>
        [...tr.children].slice(0, 3).map(td => `"${td.textContent.replace(/"/g, '""')}"`).join(",")
      );

      const csv = "Testo,Note,Link\n" + righe.join("\n");

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = lista + ".csv";
      a.click();	

      URL.revokeObjectURL(url);


    };
window.copiaLink = function (testo) {
  navigator.clipboard.writeText(testo)
    .then(() => {
      console.log("Copiato:", testo);
    })
    .catch(err => {
      console.error("Errore copia:", err);
    });
};


  </script>

</body>
</html>
