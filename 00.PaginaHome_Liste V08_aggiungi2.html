<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Liste personali (Supabase)</title>

  <!-- Import Supabase -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    // 🔧 INSERISCI QUI I TUOI DATI SUPABASE
    const supabaseUrl = "https://wuaptfrhsbeezdmwlmyh.supabase.co";
    const supabaseKey = "sb_publishable_jccRCJKOQzMlGTBj1dRbXQ_JayL41tV";

    window.supabase = createClient(supabaseUrl, supabaseKey);
  </script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background-color: #f5f7fb;
      margin: 0;
      padding: 0;
      color: #222;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #dde2ee;
      padding: 1rem 2rem;
    }

    main {
      padding: 2rem;
      max-width: 1000px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e1e5f0;
      padding: 1.5rem;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.04);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    button {
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      border: 1px solid #cbd5f5;
      background: #e5edff;
      color: #1d3bb8;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #374151;
    }

    .lista {
      margin-top: 1rem;
      padding-left: 1.2rem;
      font-size: 0.9rem;
      color: #4b5563;
    }

    .vuota {
      font-style: italic;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <header>
    <h1>Le mie liste</h1>
  </header>

  <main>
    <section class="grid">

      <!-- MUSICA -->
      <article class="card">
        <h2>Musica</h2>
        <div class="buttons">
          <button class="secondary" onclick="apriLista('musica')">Apri Lista Musica</button>
          <!--button class="secondary" onclick="aggiungiElemento('musica')">Aggiungi Elemento (old)</button-->
          <button onclick="apriPaginaNuovo('musica')">Aggiungi Elemento</button>
        </div>
        <ul class="lista" id="lista-musica"></ul>
      </article>

      <!-- RICETTE -->
      <article class="card">
        <h2>Ricette</h2>
        <div class="buttons">
          <button class="secondary" onclick="apriLista('ricette')">Apri Lista Ricette</button>
          <!--button class="secondary" onclick="aggiungiElemento('ricette')">Aggiungi Elemento (old)</button-->
          <button onclick="apriPaginaNuovo('ricette')">Aggiungi Elemento</button>
        </div>
        <ul class="lista" id="lista-ricette"></ul>
      </article>

      <!-- COMPLEANNI -->
      <article class="card">
        <h2>Compleanni</h2>
        <div class="buttons">
          <button class="secondary" onclick="apriLista('compleanni')">Apri Lista Compleanni</button>
          <!--button class="secondary" onclick="aggiungiElemento('compleanni')">Aggiungi Elemento (old)</button-->
          <button onclick="apriPaginaNuovo('compleanni')">Aggiungi Elemento</button>
        </div>
        <ul class="lista" id="lista-compleanni"></ul>
      </article>

      <!-- ALTRO -->
      <article class="card">
        <h2>Altro</h2>
        <div class="buttons">
          <button class="secondary" onclick="apriLista('altro')">Apri Lista Altro</button>
          <!--button class="secondary" onclick="aggiungiElemento('altro')">Aggiungi Elemento (old)</button-->
          <button onclick="apriPaginaNuovo('altro')">Aggiungi Elemento</button>
        </div>
        <ul class="lista" id="lista-altro"></ul>
      </article>

    </section>
  </main>

  <script type="module">
    const utente = "utente1";

    /* 📌 Carica SOLO le ultime 6 righe */
    async function caricaLista(nomeTabella) {
      const { data, error } = await supabase
        .from(nomeTabella)
        .select("testo")
        .eq("utente", utente)
        .order("id", { ascending: false })
        .limit(6);

      if (error) {
        console.error("Errore caricamento", nomeTabella, error);
        return [];
      }

      return data.reverse().map(r => r.testo);
    }

    /* 📌 Aggiorna la lista visibile */
    async function aggiornaLista(nome) {
      const ul = document.getElementById("lista-" + nome);
      ul.innerHTML = "";

      const elementi = await caricaLista(nome);

      if (elementi.length === 0) {
        const li = document.createElement("li");
        li.textContent = "Nessun elemento ancora.";
        li.className = "vuota";
        ul.appendChild(li);
        return;
      }

      elementi.forEach(testo => {
        const li = document.createElement("li");
        li.textContent = testo;
        ul.appendChild(li);
      });
    }

    /* 📌 Aggiungi un elemento semplice */
    async function aggiungiElemento(nomeTabella) {
      const testo = prompt("Aggiungi un elemento alla lista " + nomeTabella + ":");
      if (!testo || testo.trim() === "") return;

      const { error } = await supabase
        .from(nomeTabella)
        .insert({
          utente: utente,
          testo: testo.trim()
        });

      if (error) {
        console.error("Errore inserimento:", error);
        return;
      }

      aggiornaLista(nomeTabella);
    }

    /* 📌 Mostra la lista in un popup */
    function apriLista(nome) {
     window.location.href = "03.PaginaListaElemento_V01_ok.html?lista=" + nome;
    }

    /* 📌 APRI LA NUOVA PAGINA AVANZATA */
    window.apriPaginaNuovo = function (nome) {
      window.location.href = "01.PaginaNuovoElemento_V02_ok.html?lista=" + nome;
    };

    // Rendi globali
    window.apriLista = apriLista;
    window.aggiungiElemento = aggiungiElemento;

    // Carica tutte le liste all'avvio
    aggiornaLista("musica");
    aggiornaLista("ricette");
    aggiornaLista("compleanni");
    aggiornaLista("altro");
  </script>
</body>
</html>
