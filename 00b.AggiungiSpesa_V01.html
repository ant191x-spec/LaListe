<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aggiungi Elemento - Spesa</title>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    window.supabase = createClient(supabaseUrl, supabaseKey);
  </script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f7fb;
      padding: 1.5rem;
      color: #222;
      font-size: 0.9rem;
    }

    .notifica {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
      padding: 0.8rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: none;
      font-weight: 600;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 1.5rem;
      border-radius: 10px;
      border: 1px solid #e1e5f0;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05);
    }

    h1 {
      margin-top: 0;
      font-size: 1.2rem;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: 600;
      font-size: 0.9rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.3rem;
      border-radius: 6px;
      border: 1px solid #cbd5f5;
      font-size: 0.9rem;
    }

    button {
      margin-top: 0.8rem;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      border: 1px solid #cbd5f5;
      background: #e5edff;
      color: #1d3bb8;
      cursor: pointer;
      width: 100%;
      font-size: 0.9rem;
    }

    button.secondary {
      background: #fff;
      color: #374151;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .btn-plus {
      width: 0.29rem;
      height: 0.29rem;
      padding: 0.9rem;
      font-size: 1.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      border: 1px solid #cbd5f5;
      background: #e5edff;
      cursor: pointer;
    }

    .btn-plus:hover {
      background: #d8e3ff;
    }
  </style>
</head>

<body>

  <div id="notifica" class="notifica">Elemento aggiunto con successo!</div>

  <div class="container" id="form-container">

    <div class="title-row">
      <button class="btn-plus" onclick="salvaElemento()">+</button>
      <h1>Aggiungi Elemento Spesa</h1>
    </div>

    <label>Elemento</label>
    <input type="text" id="campo-testo" placeholder="Inserisci l'elemento">

    <label>Note</label>
    <textarea id="campo-note" rows="3" placeholder="Aggiungi eventuali note"></textarea>

    <label>Categoria</label>
    <input type="text" id="campo-categoria" placeholder="Es. Frutta, Carne, Casa...">

    <label>Stato</label>
    <input type="checkbox" id="campo-stato"> Comprato

    <button onclick="salvaElemento()">Salva Elemento</button>
    <button class="secondary" onclick="tornaHome()">Torna alla Home</button>
  </div>

  <script type="module">
    const utente = "utente1";

    // 🔔 Notifica se ok=1
    const params = new URLSearchParams(window.location.search);
    if (params.get("ok") === "1") {
      const box = document.getElementById("notifica");
      box.style.display = "block";
      setTimeout(() => box.style.display = "none", 3000);
    }

    // 💾 Salva elemento nella tabella SPESA
    window.salvaElemento = async function () {
      const testo = document.getElementById("campo-testo").value.trim();
      const note = document.getElementById("campo-note").value.trim();
      const categoria = document.getElementById("campo-categoria").value.trim();
      const stato = document.getElementById("campo-stato").checked;

      if (!testo) {
        alert("Il campo Elemento è obbligatorio.");
        return;
      }

      const { error } = await supabase
        .from("spesa")
        .insert({
          utente: utente,
          testo: testo,
          note: note,
          categoria: categoria,
          stato: stato
        });

      if (error) {
        console.error("Errore salvataggio:", error);
        alert("Errore durante il salvataggio.");
        return;
      }

      window.location.href = window.location.pathname + "?ok=1";
    };

    // 🔙 Torna alla Home
    window.tornaHome = function () {
      window.location.href = "00.PaginaHome_Liste V08_aggiungi2.html";
    };
  </script>

</body>
</html>
